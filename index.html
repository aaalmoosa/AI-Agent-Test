<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestrak Satellite Search</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07101f; color: #b8d4ee; font-family: 'Courier New', monospace; height: 100dvh; display: flex; flex-direction: column; }

  #header { padding: 14px 18px; border-bottom: 1px solid #142840; background: #040c18; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  #header h1 { font-size: 13px; color: #50a0f0; letter-spacing: 0.12em; }
  #header p  { font-size: 9px; color: #284060; }
  #dot { width:7px; height:7px; border-radius:50%; background:#00e87a; box-shadow:0 0 6px #00e87a; margin-left:auto; transition:all 0.3s; }
  #dot.busy { background:#f0a030; box-shadow:0 0 6px #f0a030; }

  #search-bar { padding: 12px 16px; background: #040c18; border-bottom: 1px solid #142840; display: flex; gap: 8px; flex-shrink: 0; }
  #search-input { flex:1; background: rgba(8,22,44,0.95); border: 1px solid #1a3858; color: #b8d4ee; padding: 10px 13px; font-size: 14px; font-family: inherit; outline: none; border-radius: 4px; }
  #search-btn { background: #184070; border: 1px solid #2858a0; color: #50a0f0; padding: 10px 16px; font-size: 14px; cursor: pointer; border-radius: 4px; }
  #search-btn:disabled { background: #080f1e; color: #283850; cursor: not-allowed; }

  #chips { padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #0e1e30; flex-shrink: 0; }
  .chip { background: transparent; border: 1px solid #1a3a5a; color: #3888c0; padding: 5px 12px; font-size: 11px; cursor: pointer; border-radius: 20px; font-family: inherit; }
  .chip:active { background: #102840; }

  #results { flex:1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }

  #welcome { text-align: center; padding: 40px 20px; }
  #welcome .globe { font-size: 56px; margin-bottom: 12px; }
  #welcome h2 { font-size: 14px; color: #50a0f0; letter-spacing: 0.1em; margin-bottom: 8px; }
  #welcome p { font-size: 11px; color: #284060; line-height: 1.6; }

  .result-card { background: rgba(4,18,38,0.95); border: 1px solid #102030; border-radius: 4px; padding: 12px 14px; }
  .sat-name { font-size: 14px; color: #70c0ff; font-weight: bold; margin-bottom: 8px; }
  .sat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; font-size: 11px; }
  .sat-field { color: #486080; }
  .sat-value { color: #90c8e8; }
  .sat-status { display: inline-block; margin-top: 8px; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
  .s-active   { background: rgba(0,200,100,0.15); color: #00c864; border: 1px solid #00c864; }
  .s-inactive { background: rgba(200,50,50,0.15);  color: #c84040; border: 1px solid #c84040; }
  .s-partial  { background: rgba(200,150,0,0.15);  color: #c8a000; border: 1px solid #c8a000; }
  .s-unknown  { background: rgba(80,100,120,0.15); color: #608090; border: 1px solid #608090; }
  .orbit-row { margin-top: 8px; padding-top: 8px; border-top: 1px solid #0e2030; display: flex; gap: 12px; font-size: 10px; flex-wrap: wrap; }
  .orbit-item .o-label { color: #406080; }
  .orbit-item .o-value { color: #70a8d0; }
  .info-bar  { padding: 8px 14px; background: rgba(4,18,38,0.7); border: 1px solid #0e2030; border-radius: 4px; font-size: 11px; color: #407090; }
  .error-bar { padding: 10px 14px; background: rgba(80,10,10,0.5); border: 1px solid #602020; border-radius: 4px; font-size: 12px; color: #e06060; line-height: 1.6; }
</style>
</head>
<body>

<div id="header">
  <span style="font-size:20px">🛰️</span>
  <div><h1>CELESTRAK SATELLITE SEARCH</h1><p>FREE · NO API KEY NEEDED</p></div>
  <div id="dot"></div>
</div>

<div id="search-bar">
  <input id="search-input" placeholder="Name, NORAD ID, or group…" onkeydown="if(event.key==='Enter')search()" />
  <button id="search-btn" onclick="search()">🔍</button>
</div>

<div id="chips">
  <button class="chip" onclick="go('25544','catnr')">🛸 ISS</button>
  <button class="chip" onclick="go('HUBBLE','name')">🔭 Hubble</button>
  <button class="chip" onclick="go('starlink','group')">🌐 Starlink</button>
  <button class="chip" onclick="go('gps-ops','group')">📡 GPS</button>
  <button class="chip" onclick="go('TIANGONG','name')">🇨🇳 Tiangong</button>
  <button class="chip" onclick="go('stations','group')">🏠 Stations</button>
  <button class="chip" onclick="go('weather','group')">🌦 Weather</button>
  <button class="chip" onclick="go('iridium','group')">📶 Iridium</button>
</div>

<div id="results">
  <div id="welcome">
    <div class="globe">🌍</div>
    <h2>SATELLITE CATALOG SEARCH</h2>
    <p>Search 25,000+ tracked objects in Earth orbit.<br>Completely free — no account or key needed.</p>
  </div>
</div>

<script>
const PROXY  = "https://corsproxy.io/?url=";
const SATCAT = "https://celestrak.org/satcat/records.php";
const GP     = "https://celestrak.org/NORAD/elements/gp.php";

const STATUS = {
  "+": ["Active","s-active"], "-": ["Inactive","s-inactive"],
  "P": ["Partial","s-partial"], "B": ["Backup","s-partial"],
  "S": ["Standby","s-partial"], "X": ["Extended","s-active"],
  "D": ["Decayed","s-inactive"], "?": ["Unknown","s-unknown"]
};

const TYPES = { PAY:"Payload", "R/B":"Rocket Body", DEB:"Debris", UNK:"Unknown" };

function setBusy(b) {
  document.getElementById("dot").className = b ? "busy" : "";
  document.getElementById("search-btn").disabled = b;
  document.getElementById("search-input").disabled = b;
}

function show(html) { document.getElementById("results").innerHTML = html; }

function badge(code) {
  const [label, cls] = STATUS[code] || ["Unknown","s-unknown"];
  return `<span class="sat-status ${cls}">${label}</span>`;
}

function cardSatcat(s) {
  const name   = s.OBJECT_NAME || "Unknown";
  const catnr  = s.NORAD_CAT_ID || "—";
  const intdes = s.OBJECT_ID || "—";
  const country= s.COUNTRY || "—";
  const launch = s.LAUNCH_DATE || "—";
  const type   = TYPES[s.OBJECT_TYPE] || s.OBJECT_TYPE || "—";
  const status = s.OPS_STATUS_CODE || "?";
  const period = s.PERIOD ? s.PERIOD+" min" : "—";
  const inc    = s.INCLINATION ? s.INCLINATION+"°" : "—";
  const apogee = s.APOGEE ? s.APOGEE+" km" : "—";
  const perigee= s.PERIGEE ? s.PERIGEE+" km" : "—";
  return `<div class="result-card">
    <div class="sat-name">${name}</div>
    <div class="sat-grid">
      <span class="sat-field">NORAD ID</span>   <span class="sat-value">${catnr}</span>
      <span class="sat-field">Int'l Des.</span>  <span class="sat-value">${intdes}</span>
      <span class="sat-field">Country</span>     <span class="sat-value">${country}</span>
      <span class="sat-field">Type</span>        <span class="sat-value">${type}</span>
      <span class="sat-field">Launched</span>    <span class="sat-value">${launch}</span>
    </div>
    ${badge(status)}
    <div class="orbit-row">
      <div class="orbit-item"><span class="o-label">Period </span><span class="o-value">${period}</span></div>
      <div class="orbit-item"><span class="o-label">Incl. </span><span class="o-value">${inc}</span></div>
      <div class="orbit-item"><span class="o-label">Apogee </span><span class="o-value">${apogee}</span></div>
      <div class="orbit-item"><span class="o-label">Perigee </span><span class="o-value">${perigee}</span></div>
    </div>
  </div>`;
}

function cardGP(s) {
  const name  = s.OBJECT_NAME || "Unknown";
  const catnr = s.NORAD_CAT_ID || "—";
  const epoch = s.EPOCH ? s.EPOCH.slice(0,10) : "—";
  const inc   = s.INCLINATION ? parseFloat(s.INCLINATION).toFixed(1)+"°" : "—";
  const alt   = s.SEMIMAJOR_AXIS ? Math.round(parseFloat(s.SEMIMAJOR_AXIS)-6371)+" km" : "—";
  return `<div class="result-card">
    <div class="sat-name">${name}</div>
    <div class="sat-grid">
      <span class="sat-field">NORAD ID</span>    <span class="sat-value">${catnr}</span>
      <span class="sat-field">TLE Epoch</span>   <span class="sat-value">${epoch}</span>
      <span class="sat-field">Inclination</span> <span class="sat-value">${inc}</span>
      <span class="sat-field">Altitude</span>    <span class="sat-value">${alt}</span>
    </div>
  </div>`;
}

async function go(query, type) {
  document.getElementById("search-input").value = query;
  setBusy(true);
  show(`<div class="info-bar">⟳ Searching for "${query}"…</div>`);
  try {
    if (type === "catnr") {
      const url = PROXY + encodeURIComponent(`${SATCAT}?CATNR=${query}&FORMAT=JSON`);
      const d = await fetch(url).then(r => r.json());
      show(d.length ? `<div class="info-bar">Found ${d.length} result${d.length>1?"s":""}</div>` + d.map(cardSatcat).join("") : `<div class="error-bar">No results found.</div>`);
    } else if (type === "intdes") {
      const url = PROXY + encodeURIComponent(`${SATCAT}?INTDES=${query}&FORMAT=JSON`);
      const d = await fetch(url).then(r => r.json());
      show(d.length ? `<div class="info-bar">Found ${d.length} result${d.length>1?"s":""}</div>` + d.map(cardSatcat).join("") : `<div class="error-bar">No results found.</div>`);
    } else if (type === "group") {
      const url = PROXY + encodeURIComponent(`${GP}?GROUP=${query}&FORMAT=JSON`);
      const d = await fetch(url).then(r => r.json());
      const slice = d.slice(0, 30);
      show(`<div class="info-bar">Showing ${slice.length} of ${d.length} in group <b>${query}</b></div>` + slice.map(cardGP).join(""));
    } else {
      const url = PROXY + encodeURIComponent(`${SATCAT}?NAME=${encodeURIComponent(query)}&FORMAT=JSON&MAX=20`);
      const d = await fetch(url).then(r => r.json());
      show(d.length ? `<div class="info-bar">Found ${d.length} result${d.length>1?"s":""}</div>` + d.map(cardSatcat).join("") : `<div class="error-bar">No results for "${query}". Try a different name or NORAD ID.</div>`);
    }
  } catch(e) {
    show(`<div class="error-bar">❌ ${e.message}<br><br>Proxy may be temporarily unavailable. Try again in a moment.</div>`);
  }
  setBusy(false);
}

function search() {
  const q = document.getElementById("search-input").value.trim();
  if (!q) return;
  if (/^\d{4,6}$/.test(q)) go(q, "catnr");
  else if (/^\d{4}-\d{3}/.test(q)) go(q, "intdes");
  else go(q, "name");
}
</script>
</body>
</html>
