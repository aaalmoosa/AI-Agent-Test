<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestrak Satellite Search</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.3/dist/satellite.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07101f; color: #b8d4ee; font-family: 'Courier New', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  #header { padding: 12px 18px; border-bottom: 1px solid #142840; background: #040c18; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  #header h1 { font-size: 12px; color: #50a0f0; letter-spacing: 0.12em; }
  #header p  { font-size: 9px; color: #284060; }
  #dot { width:7px; height:7px; border-radius:50%; background:#00e87a; box-shadow:0 0 6px #00e87a; margin-left:auto; transition:all 0.3s; }
  #dot.busy { background:#f0a030; box-shadow:0 0 6px #f0a030; }
  #search-bar { padding: 10px 14px; background: #040c18; border-bottom: 1px solid #142840; display: flex; gap: 8px; flex-shrink: 0; }
  #search-input { flex:1; background: rgba(8,22,44,0.95); border: 1px solid #1a3858; color: #b8d4ee; padding: 8px 12px; font-size: 13px; font-family: inherit; outline: none; border-radius: 4px; }
  #search-btn { background: #184070; border: 1px solid #2858a0; color: #50a0f0; padding: 8px 14px; font-size: 13px; cursor: pointer; border-radius: 4px; }
  #search-btn:disabled { background: #080f1e; color: #283850; cursor: not-allowed; }
  #chips { padding: 8px 14px; display: flex; flex-wrap: wrap; gap: 6px; border-bottom: 1px solid #0e1e30; flex-shrink: 0; }
  .chip { background: transparent; border: 1px solid #1a3a5a; color: #3888c0; padding: 4px 10px; font-size: 11px; cursor: pointer; border-radius: 20px; font-family: inherit; }
  .chip:active { background: #102840; }
  #main { flex:1; display: flex; flex-direction: column; overflow: hidden; }
  #results { flex:1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  #welcome { text-align: center; padding: 30px 20px; }
  #welcome .globe { font-size: 50px; margin-bottom: 10px; }
  #welcome h2 { font-size: 13px; color: #50a0f0; letter-spacing: 0.1em; margin-bottom: 6px; }
  #welcome p { font-size: 11px; color: #284060; line-height: 1.6; }
  .result-card { background: rgba(4,18,38,0.95); border: 1px solid #102030; border-radius: 4px; padding: 10px 12px; cursor: pointer; transition: border-color 0.15s; }
  .result-card:active { border-color: #3080c0; }
  .result-card.selected { border-color: #50a0f0; background: rgba(10,30,60,0.95); }
  .sat-name { font-size: 13px; color: #70c0ff; font-weight: bold; margin-bottom: 6px; }
  .sat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px 10px; font-size: 10px; }
  .sat-field { color: #486080; }
  .sat-value { color: #90c8e8; }
  .sat-status { display: inline-block; margin-top: 6px; padding: 2px 7px; border-radius: 10px; font-size: 9px; font-weight: bold; }
  .s-active   { background: rgba(0,200,100,0.15); color: #00c864; border: 1px solid #00c864; }
  .s-inactive { background: rgba(200,50,50,0.15);  color: #c84040; border: 1px solid #c84040; }
  .s-partial  { background: rgba(200,150,0,0.15);  color: #c8a000; border: 1px solid #c8a000; }
  .s-unknown  { background: rgba(80,100,120,0.15); color: #608090; border: 1px solid #608090; }
  .orbit-row { margin-top: 6px; padding-top: 6px; border-top: 1px solid #0e2030; display: flex; gap: 10px; font-size: 10px; flex-wrap: wrap; }
  .o-label { color: #406080; }
  .o-value { color: #70a8d0; }
  .viz-btn { margin-top: 8px; width: 100%; padding: 6px; background: rgba(20,60,120,0.5); border: 1px solid #2858a0; color: #60b0f0; font-size: 11px; cursor: pointer; border-radius: 3px; font-family: inherit; }
  .info-bar  { padding: 8px 12px; background: rgba(4,18,38,0.7); border: 1px solid #0e2030; border-radius: 4px; font-size: 11px; color: #407090; }
  .error-bar { padding: 10px 12px; background: rgba(80,10,10,0.5); border: 1px solid #602020; border-radius: 4px; font-size: 11px; color: #e06060; line-height: 1.6; }
  #viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #010810; z-index: 100; flex-direction: column; }
  #viewer.open { display: flex; }
  #viewer-header { padding: 10px 14px; background: rgba(4,12,24,0.9); border-bottom: 1px solid #142840; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  #viewer-title { flex:1; font-size: 12px; color: #50a0f0; letter-spacing: 0.1em; }
  #viewer-close { background: transparent; border: 1px solid #2a4060; color: #6090c0; padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: 11px; border-radius: 3px; }
  #canvas-wrap { flex:1; position: relative; }
  #three-canvas { width: 100%; height: 100%; display: block; }
  #viewer-info { position: absolute; bottom: 12px; left: 12px; background: rgba(4,12,24,0.85); border: 1px solid #142840; padding: 8px 12px; border-radius: 4px; font-size: 10px; color: #6090b0; line-height: 1.8; pointer-events: none; }
  #viewer-info b { color: #80c0f0; }
  #loading-3d { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 12px; color: #4080a0; }
</style>
</head>
<body>

<div id="header">
  <span style="font-size:18px">🛰️</span>
  <div><h1>CELESTRAK SATELLITE SEARCH</h1><p>TAP A CARD TO VIEW 3D ORBIT</p></div>
  <div id="dot"></div>
</div>

<div id="search-bar">
  <input id="search-input" placeholder="Name, NORAD ID, or group…" onkeydown="if(event.key==='Enter')search()" />
  <button id="search-btn" onclick="search()">🔍</button>
</div>

<div id="chips">
  <button class="chip" onclick="go('25544','catnr')">🛸 ISS</button>
  <button class="chip" onclick="go('HUBBLE','name')">🔭 Hubble</button>
  <button class="chip" onclick="go('starlink','group')">🌐 Starlink</button>
  <button class="chip" onclick="go('gps-ops','group')">📡 GPS</button>
  <button class="chip" onclick="go('TIANGONG','name')">🇨🇳 Tiangong</button>
  <button class="chip" onclick="go('stations','group')">🏠 Stations</button>
  <button class="chip" onclick="go('weather','group')">🌦 Weather</button>
</div>

<div id="main">
  <div id="results">
    <div id="welcome">
      <div class="globe">🌍</div>
      <h2>SATELLITE CATALOG SEARCH</h2>
      <p>Search 25,000+ tracked objects.<br>Tap any result to see its 3D orbit.</p>
    </div>
  </div>
</div>

<div id="viewer">
  <div id="viewer-header">
    <div id="viewer-title">ORBIT VISUALIZATION</div>
    <button id="viewer-close" onclick="closeViewer()">✕ CLOSE</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div id="loading-3d">Loading TLE data…</div>
    <div id="viewer-info"></div>
  </div>
</div>

<script>
const PROXY  = "https://corsproxy.io/?url=";
const SATCAT = "https://celestrak.org/satcat/records.php";
const GP     = "https://celestrak.org/NORAD/elements/gp.php";

const STATUS = {
  "+":["Active","s-active"], "-":["Inactive","s-inactive"],
  "P":["Partial","s-partial"],"B":["Backup","s-partial"],
  "S":["Standby","s-partial"],"X":["Extended","s-active"],
  "D":["Decayed","s-inactive"],"?":["Unknown","s-unknown"]
};
const TYPES = { PAY:"Payload","R/B":"Rocket Body",DEB:"Debris",UNK:"Unknown" };

function setBusy(b) {
  document.getElementById("dot").className = b ? "busy" : "";
  document.getElementById("search-btn").disabled = b;
  document.getElementById("search-input").disabled = b;
}
function show(html) { document.getElementById("results").innerHTML = html; }
function badge(code) {
  const [label,cls] = STATUS[code]||["Unknown","s-unknown"];
  return `<span class="sat-status ${cls}">${label}</span>`;
}

function cardSatcat(s) {
  const name   = s.OBJECT_NAME||"Unknown";
  const catnr  = s.NORAD_CAT_ID||"";
  const intdes = s.OBJECT_ID||"—";
  const country= s.COUNTRY||"—";
  const launch = s.LAUNCH_DATE||"—";
  const type   = TYPES[s.OBJECT_TYPE]||s.OBJECT_TYPE||"—";
  const status = s.OPS_STATUS_CODE||"?";
  const period = s.PERIOD ? s.PERIOD+" min" : "—";
  const inc    = s.INCLINATION ? s.INCLINATION+"°" : "—";
  const apogee = s.APOGEE ? s.APOGEE+" km" : "—";
  const perigee= s.PERIGEE ? s.PERIGEE+" km" : "—";
  const data   = encodeURIComponent(JSON.stringify({name,catnr,inc,apogee,perigee}));
  return `<div class="result-card" onclick="openViewer('${data}')">
    <div class="sat-name">${name}</div>
    <div class="sat-grid">
      <span class="sat-field">NORAD ID</span>   <span class="sat-value">${catnr||"—"}</span>
      <span class="sat-field">Int'l Des.</span>  <span class="sat-value">${intdes}</span>
      <span class="sat-field">Country</span>     <span class="sat-value">${country}</span>
      <span class="sat-field">Type</span>        <span class="sat-value">${type}</span>
      <span class="sat-field">Launched</span>    <span class="sat-value">${launch}</span>
    </div>
    ${badge(status)}
    <div class="orbit-row">
      <div><span class="o-label">Period </span><span class="o-value">${period}</span></div>
      <div><span class="o-label">Incl. </span><span class="o-value">${inc}</span></div>
      <div><span class="o-label">Apogee </span><span class="o-value">${apogee}</span></div>
      <div><span class="o-label">Perigee </span><span class="o-value">${perigee}</span></div>
    </div>
    <button class="viz-btn" onclick="event.stopPropagation();openViewer('${data}')">🌍 View 3D Orbit</button>
  </div>`;
}

function cardGP(s) {
  const name  = s.OBJECT_NAME||"Unknown";
  const catnr = s.NORAD_CAT_ID||"";
  const epoch = s.EPOCH ? s.EPOCH.slice(0,10) : "—";
  const inc   = s.INCLINATION ? parseFloat(s.INCLINATION).toFixed(1)+"°" : "—";
  const alt   = s.SEMIMAJOR_AXIS ? Math.round(parseFloat(s.SEMIMAJOR_AXIS)-6371)+" km" : "—";
  const data  = encodeURIComponent(JSON.stringify({name,catnr,inc,alt}));
  return `<div class="result-card" onclick="openViewer('${data}')">
    <div class="sat-name">${name}</div>
    <div class="sat-grid">
      <span class="sat-field">NORAD ID</span>    <span class="sat-value">${catnr||"—"}</span>
      <span class="sat-field">TLE Epoch</span>   <span class="sat-value">${epoch}</span>
      <span class="sat-field">Inclination</span> <span class="sat-value">${inc}</span>
      <span class="sat-field">Altitude</span>    <span class="sat-value">${alt}</span>
    </div>
    <button class="viz-btn" onclick="event.stopPropagation();openViewer('${data}')">🌍 View 3D Orbit</button>
  </div>`;
}

async function go(query, type) {
  document.getElementById("search-input").value = query;
  setBusy(true);
  show(`<div class="info-bar">⟳ Searching for "${query}"…</div>`);
  try {
    if (type === "catnr") {
      const d = await fetch(PROXY+encodeURIComponent(`${SATCAT}?CATNR=${query}&FORMAT=JSON`)).then(r=>r.json());
      show(d.length ? `<div class="info-bar">Found ${d.length} result${d.length>1?"s":""} — tap to view orbit</div>`+d.map(cardSatcat).join("") : `<div class="error-bar">No results.</div>`);
    } else if (type === "intdes") {
      const d = await fetch(PROXY+encodeURIComponent(`${SATCAT}?INTDES=${query}&FORMAT=JSON`)).then(r=>r.json());
      show(d.length ? `<div class="info-bar">Found ${d.length} result${d.length>1?"s":""} — tap to view orbit</div>`+d.map(cardSatcat).join("") : `<div class="error-bar">No results.</div>`);
    } else if (type === "group") {
      const d = await fetch(PROXY+encodeURIComponent(`${GP}?GROUP=${query}&FORMAT=JSON`)).then(r=>r.json());
      const slice = d.slice(0,30);
      show(`<div class="info-bar">Showing ${slice.length} of ${d.length} in <b>${query}</b> — tap to view orbit</div>`+slice.map(cardGP).join(""));
    } else {
      const d = await fetch(PROXY+encodeURIComponent(`${SATCAT}?NAME=${encodeURIComponent(query)}&FORMAT=JSON&MAX=20`)).then(r=>r.json());
      show(d.length ? `<div class="info-bar">Found ${d.length} result${d.length>1?"s":""} — tap to view orbit</div>`+d.map(cardSatcat).join("") : `<div class="error-bar">No results for "${query}".</div>`);
    }
  } catch(e) {
    show(`<div class="error-bar">❌ ${e.message}<br>Proxy may be temporarily unavailable. Try again.</div>`);
  }
  setBusy(false);
}

function search() {
  const q = document.getElementById("search-input").value.trim();
  if (!q) return;
  if (/^\d{4,6}$/.test(q)) go(q,"catnr");
  else if (/^\d{4}-\d{3}/.test(q)) go(q,"intdes");
  else go(q,"name");
}

let threeCtx = null;

function closeViewer() {
  document.getElementById("viewer").classList.remove("open");
  if (threeCtx) {
    cancelAnimationFrame(threeCtx.animId);
    threeCtx.renderer.dispose();
    threeCtx = null;
  }
}

async function openViewer(dataStr) {
  const sat = JSON.parse(decodeURIComponent(dataStr));
  document.getElementById("viewer").classList.add("open");
  document.getElementById("viewer-title").textContent = sat.name;
  document.getElementById("loading-3d").style.display = "block";
  document.getElementById("viewer-info").innerHTML = "";

  let tle1 = null, tle2 = null;
  if (sat.catnr) {
    try {
      const url = PROXY + encodeURIComponent(`${GP}?CATNR=${sat.catnr}&FORMAT=TLE`);
      const text = await fetch(url).then(r => r.text());
      const lines = text.trim().split("\n").map(l => l.trim()).filter(Boolean);
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith("1 ") && lines[i].length > 60) tle1 = lines[i];
        if (lines[i].startsWith("2 ") && lines[i].length > 60) tle2 = lines[i];
      }
    } catch(e) { console.warn("TLE fetch failed:", e); }
  }

  document.getElementById("loading-3d").style.display = "none";
  initThree(sat, tle1, tle2);
}

function initThree(sat, tle1, tle2) {
  if (threeCtx) {
    cancelAnimationFrame(threeCtx.animId);
    threeCtx.renderer.dispose();
  }

  const wrap   = document.getElementById("canvas-wrap");
  const canvas = document.getElementById("three-canvas");
  const W = wrap.clientWidth, H = wrap.clientHeight;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100000);
  camera.position.set(0, 0, 22000);

  const starGeo = new THREE.BufferGeometry();
  const starPos = new Float32Array(3000 * 3);
  for (let i = 0; i < starPos.length; i++) starPos[i] = (Math.random()-0.5)*200000;
  starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color:0xffffff, size:60 })));

  const earth = new THREE.Mesh(
    new THREE.SphereGeometry(6371, 48, 48),
    new THREE.MeshPhongMaterial({ color:0x1a4a8a, emissive:0x081828, shininess:15 })
  );
  scene.add(earth);

  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(6373, 24, 16),
    new THREE.MeshBasicMaterial({ color:0x204060, wireframe:true, transparent:true, opacity:0.15 })
  ));

  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(6500, 32, 32),
    new THREE.MeshPhongMaterial({ color:0x1060c0, transparent:true, opacity:0.08, side:THREE.FrontSide })
  ));

  scene.add(new THREE.AmbientLight(0x223344, 2));
  const sun = new THREE.DirectionalLight(0xffffff, 1.5);
  sun.position.set(50000, 20000, 30000);
  scene.add(sun);

  if (tle1 && tle2) {
    try {
      const satrec = satellite.twoline2satrec(tle1, tle2);
      const periodMin = (2 * Math.PI / satrec.no);
      const steps = 180;
      const points = [];
      const now = new Date();

      for (let i = 0; i <= steps; i++) {
        const t = new Date(now.getTime() + (i / steps) * periodMin * 60000);
        const pv = satellite.propagate(satrec, t);
        if (pv && pv.position) {
          points.push(new THREE.Vector3(pv.position.x, pv.position.z, -pv.position.y));
        }
      }

      if (points.length > 2) {
        scene.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(points),
          new THREE.LineBasicMaterial({ color:0x00aaff, transparent:true, opacity:0.7 })
        ));
      }

      const pv = satellite.propagate(satrec, now);
      if (pv && pv.position) {
        const pos = new THREE.Vector3(pv.position.x, pv.position.z, -pv.position.y);
        const satMesh = new THREE.Mesh(
          new THREE.SphereGeometry(180, 12, 12),
          new THREE.MeshBasicMaterial({ color:0xff4400 })
        );
        satMesh.position.copy(pos);
        scene.add(satMesh);

        scene.add(new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), pos]),
          new THREE.LineBasicMaterial({ color:0xff4400, transparent:true, opacity:0.25 })
        ));

        camera.position.set(pos.x*1.8, pos.y*1.8, pos.z*1.8+6000);
        camera.lookAt(0,0,0);

        const gmst = satellite.gstime(now);
        const geo  = satellite.eciToGeodetic(pv.position, gmst);
        const lat  = satellite.degreesLat(geo.latitude).toFixed(2);
        const lon  = satellite.degreesLong(geo.longitude).toFixed(2);
        const alt  = Math.round(geo.height);
        document.getElementById("viewer-info").innerHTML =
          `<b>${sat.name}</b><br>Lat: ${lat}°  Lon: ${lon}°<br>Alt: ${alt} km<br>🔴 Current position`;
      }
    } catch(e) {
      document.getElementById("viewer-info").innerHTML = `<b>${sat.name}</b><br>Orbit calc error: ${e.message}`;
    }
  } else {
    const apogee  = sat.apogee  ? parseInt(sat.apogee)  : 500;
    const perigee = sat.perigee ? parseInt(sat.perigee) : 500;
    const inc = sat.inc ? parseFloat(sat.inc) * Math.PI/180 : 0.9;
    const a = 6371 + (apogee + perigee) / 2;
    const e = Math.max(0, (apogee - perigee) / (2 * a));
    const pts = [];
    for (let i = 0; i <= 180; i++) {
      const theta = (i/180) * 2 * Math.PI;
      const r = a * (1-e*e) / (1 + e*Math.cos(theta));
      pts.push(new THREE.Vector3(
        r * Math.cos(theta),
        r * Math.sin(theta) * Math.sin(inc),
        r * Math.sin(theta) * Math.cos(inc)
      ));
    }
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({ color:0x00aaff, transparent:true, opacity:0.7 })
    ));
    document.getElementById("viewer-info").innerHTML =
      `<b>${sat.name}</b><br>Estimated orbit<br>(no live TLE)`;
  }

  let isDragging=false, prevX=0, prevY=0, rotX=0, rotY=0;
  canvas.addEventListener("touchstart", e=>{ isDragging=true; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; },{passive:true});
  canvas.addEventListener("touchmove",  e=>{ if(!isDragging)return; rotY+=(e.touches[0].clientX-prevX)*0.005; rotX+=(e.touches[0].clientY-prevY)*0.005; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; },{passive:true});
  canvas.addEventListener("touchend",   ()=>isDragging=false);
  canvas.addEventListener("mousedown",  e=>{ isDragging=true; prevX=e.clientX; prevY=e.clientY; });
  canvas.addEventListener("mousemove",  e=>{ if(!isDragging)return; rotY+=(e.clientX-prevX)*0.005; rotX+=(e.clientY-prevY)*0.005; prevX=e.clientX; prevY=e.clientY; });
  canvas.addEventListener("mouseup",    ()=>isDragging=false);

  let lastDist=0;
  canvas.addEventListener("touchstart", e=>{ if(e.touches.length===2) lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); },{passive:true});
  canvas.addEventListener("touchmove",  e=>{ if(e.touches.length===2){ const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); camera.position.multiplyScalar(lastDist/d); lastDist=d; } },{passive:true});

  threeCtx = { renderer, animId: null };

  function animate() {
    threeCtx.animId = requestAnimationFrame(animate);
    earth.rotation.y += 0.001;
    const s = new THREE.Spherical().setFromVector3(camera.position);
    s.theta -= rotY*0.3; s.phi = Math.max(0.1, Math.min(Math.PI-0.1, s.phi+rotX*0.3));
    rotX*=0.85; rotY*=0.85;
    camera.position.setFromSpherical(s);
    camera.lookAt(0,0,0);
    renderer.render(scene, camera);
  }
  animate();
}
</script>
</body>
</html>
