<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Celestrak SATCAT Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #07101f; color: #b8d4ee; font-family: 'Courier New', monospace; height: 100dvh; display: flex; flex-direction: column; }
  #header { padding: 12px 18px; border-bottom: 1px solid #142840; background: #040c18; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  #header h1 { font-size: 13px; color: #50a0f0; letter-spacing: 0.12em; }
  #header p  { font-size: 9px; color: #284060; }
  #dot { width:7px; height:7px; border-radius:50%; background:#00e87a; box-shadow:0 0 5px #00e87a; margin-left:auto; transition: all 0.3s; }
  #dot.busy { background:#f0a030; box-shadow:0 0 5px #f0a030; }
  #api-bar { padding:10px 16px; background:#040c18; border-bottom:1px solid #142840; display:flex; gap:8px; align-items:center; flex-shrink:0; }
  #api-key { flex:1; background:rgba(8,22,44,0.95); border:1px solid #1a3858; color:#b8d4ee; padding:8px 12px; font-size:12px; font-family:inherit; outline:none; border-radius:3px; }
  #save-key { background:#184070; border:1px solid #2858a0; color:#50a0f0; padding:8px 12px; font-size:11px; cursor:pointer; font-family:inherit; border-radius:3px; white-space:nowrap; }
  #key-status { font-size:10px; color:#28906a; white-space:nowrap; }
  #messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .bubble { max-width:88%; padding:10px 14px; font-size:13px; line-height:1.8; white-space:pre-wrap; border-radius:4px; }
  .user { align-self:flex-end; background:rgba(25,65,115,0.5); border:1px solid #254878; color:#80b8e8; }
  .bot  { align-self:flex-start; background:rgba(4,18,38,0.95); border:1px solid #102030; color:#b8d4ee; }
  .bot-label { font-size:8px; color:#286088; margin-bottom:5px; letter-spacing:0.15em; }
  .status-bubble { align-self:flex-start; padding:6px 12px; background:rgba(4,18,38,0.95); border:1px solid #103040; font-size:10px; color:#28906a; border-radius:3px; font-style:italic; }
  #chips { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }
  .chip { background:transparent; border:1px solid #1a3a5a; color:#3888c0; padding:6px 14px; font-size:12px; cursor:pointer; border-radius:3px; font-family:inherit; }
  #input-row { padding:12px 16px; border-top:1px solid #142840; background:#040c18; display:flex; gap:8px; flex-shrink:0; }
  #input { flex:1; background:rgba(8,22,44,0.95); border:1px solid #1a3858; color:#b8d4ee; padding:10px 13px; font-size:14px; font-family:inherit; outline:none; border-radius:3px; }
  #send-btn { background:#184070; border:1px solid #2858a0; color:#50a0f0; padding:10px 18px; font-size:16px; cursor:pointer; border-radius:3px; }
  #send-btn:disabled { background:#080f1e; color:#283850; cursor:not-allowed; }
</style>
</head>
<body>

<div id="header">
  <span style="font-size:20px">🛰️</span>
  <div><h1>CELESTRAK SATCAT AGENT</h1><p>LIVE SATELLITE CATALOG</p></div>
  <div id="dot"></div>
</div>

<div id="api-bar">
  <input id="api-key" type="password" placeholder="Paste Anthropic API key…" autocomplete="off" />
  <button id="save-key" onclick="saveKey()">SAVE KEY</button>
  <span id="key-status"></span>
</div>

<div id="messages">
  <div class="bubble bot">
    <div class="bot-label">◈ SATCAT AGENT</div>Welcome! Paste your Anthropic API key above and tap SAVE KEY to get started.

Then ask me anything about satellites — by name, NORAD number, or group.
  </div>
  <div id="chips">
    <button class="chip" onclick="send('International Space Station')">🛸 ISS</button>
    <button class="chip" onclick="send('Hubble Space Telescope')">🔭 Hubble</button>
    <button class="chip" onclick="send('Show me Starlink satellites')">🌐 Starlink</button>
    <button class="chip" onclick="send('GPS satellites')">📡 GPS</button>
    <button class="chip" onclick="send('Tiangong space station')">🇨🇳 Tiangong</button>
  </div>
</div>

<div id="input-row">
  <input id="input" placeholder="Ask about any satellite…" onkeydown="if(event.key==='Enter')send(this.value)" />
  <button id="send-btn" onclick="send(document.getElementById('input').value)">▶</button>
</div>

<script>
const PROXY = "https://corsproxy.io/?url=";
const SATCAT_URL = "https://celestrak.org/satcat/records.php";
const GP_URL     = "https://celestrak.org/NORAD/elements/gp.php";
const CLAUDE_URL = "https://api.anthropic.com/v1/messages";

let apiKey  = localStorage.getItem("satcat_key") || "";
let history = [];
let busy    = false;

if (apiKey) {
  document.getElementById("api-key").value = "••••••••••••••••";
  document.getElementById("key-status").textContent = "✓ Key ready";
}

function saveKey() {
  const val = document.getElementById("api-key").value.trim();
  if (!val || val.startsWith("•")) return;
  apiKey = val;
  localStorage.setItem("satcat_key", apiKey);
  document.getElementById("api-key").value = "••••••••••••••••";
  document.getElementById("key-status").textContent = "✓ Saved!";
}

function setBusy(b) {
  busy = b;
  document.getElementById("dot").className = b ? "busy" : "";
  document.getElementById("send-btn").disabled = b;
  document.getElementById("input").disabled = b;
}

function addMsg(role, text) {
  const d = document.createElement("div");
  d.className = "bubble " + role;
  if (role === "bot") {
    const label = document.createElement("div");
    label.className = "bot-label";
    label.textContent = "◈ SATCAT AGENT";
    d.appendChild(label);
    const content = document.createElement("div");
    content.textContent = text;
    d.appendChild(content);
  } else {
    d.textContent = text;
  }
  document.getElementById("messages").appendChild(d);
  d.scrollIntoView({ behavior: "smooth" });
  return d;
}

let statusEl = null;
function setStatus(text) {
  if (statusEl) { statusEl.remove(); statusEl = null; }
  if (!text) return;
  statusEl = document.createElement("div");
  statusEl.className = "status-bubble";
  statusEl.textContent = text;
  document.getElementById("messages").appendChild(statusEl);
  statusEl.scrollIntoView({ behavior: "smooth" });
}

// ── Celestrak fetchers ──────────────────────────────────────────────────

async function fetchSatcat(params) {
  params.FORMAT = "JSON";
  const url = PROXY + encodeURIComponent(SATCAT_URL + "?" + new URLSearchParams(params));
  const r = await fetch(url);
  if (!r.ok) throw new Error("Celestrak " + r.status);
  return r.json();
}

async function fetchGP(params) {
  params.FORMAT = "JSON";
  const url = PROXY + encodeURIComponent(GP_URL + "?" + new URLSearchParams(params));
  const r = await fetch(url);
  if (!r.ok) throw new Error("Celestrak GP " + r.status);
  return r.json();
}

async function runTool(name, inp) {
  try {
    if (name === "search_by_name") {
      const d = await fetchSatcat({ NAME: inp.name, MAX: String(inp.max || 15) });
      return { count: d.length, results: d };
    }
    if (name === "search_by_catnr") {
      const d = await fetchSatcat({ CATNR: inp.catnr });
      return { count: d.length, results: d };
    }
    if (name === "search_by_intdes") {
      const d = await fetchSatcat({ INTDES: inp.intdes });
      return { count: d.length, results: d };
    }
    if (name === "get_group") {
      const d = await fetchGP({ GROUP: inp.group });
      const s = d.slice(0, inp.max || 20);
      return { total: d.length, shown: s.length, results: s };
    }
    return { error: "Unknown tool: " + name };
  } catch(e) {
    return { error: e.message };
  }
}

// ── Claude agent loop ───────────────────────────────────────────────────

const TOOLS = [
  { name: "search_by_name",   description: "Search Celestrak SATCAT by satellite name (partial ok). E.g. 'ISS', 'Hubble', 'Starlink'.", input_schema: { type:"object", properties: { name:{type:"string",description:"Satellite name"}, max:{type:"number",description:"Max results, default 15"} }, required:["name"] } },
  { name: "search_by_catnr",  description: "Search by NORAD catalog number e.g. '25544' for ISS.",    input_schema: { type:"object", properties: { catnr:{type:"string"} }, required:["catnr"] } },
  { name: "search_by_intdes", description: "Search by International Designator e.g. '1998-067A'.",    input_schema: { type:"object", properties: { intdes:{type:"string"} }, required:["intdes"] } },
  { name: "get_group",        description: "Get satellites by group name: starlink, oneweb, gps-ops, stations, active, debris, iridium, weather.", input_schema: { type:"object", properties: { group:{type:"string"}, max:{type:"number"} }, required:["group"] } }
];

async function callClaude(messages) {
  const url = PROXY + encodeURIComponent(CLAUDE_URL);
  const r = await fetch(url, {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1024,
      system: "You are a satellite tracking assistant with live access to the Celestrak SATCAT database. Use tools to search for satellites. Present results clearly including name, NORAD ID, country, launch date, and status. Status codes: + Active  - Inactive  P Partial  B Backup  D Decayed.",
      tools: TOOLS,
      messages,
    })
  });
  const text = await r.text();
  let data;
  try { data = JSON.parse(text); } catch { throw new Error("Bad response: " + text.slice(0, 150)); }
  if (!r.ok) throw new Error("Claude API " + r.status + ": " + (data?.error?.message || text.slice(0,150)));
  return data;
}

async function send(text) {
  text = text.trim();
  if (!text || busy) return;
  if (!apiKey) { alert("Please paste your Anthropic API key first!"); return; }

  document.getElementById("input").value = "";
  document.getElementById("chips").style.display = "none";
  addMsg("user", text);
  history.push({ role: "user", content: text });
  setBusy(true);
  setStatus("⟳ Thinking…");

  let apiMsgs = history.map(m => ({ role: m.role, content: m.content }));

  try {
    while (true) {
      const data = await callClaude(apiMsgs);

      if (data.stop_reason === "tool_use") {
        apiMsgs.push({ role: "assistant", content: data.content });
        const results = [];
        for (const block of data.content) {
          if (block.type !== "tool_use") continue;
          setStatus("🔭 Searching Celestrak: " + block.name + "…");
          const result = await runTool(block.name, block.input);
          results.push({ type: "tool_result", tool_use_id: block.id, content: JSON.stringify(result) });
        }
        apiMsgs.push({ role: "user", content: results });
      } else {
        const reply = data.content.filter(b => b.type === "text").map(b => b.text).join("");
        setStatus(null);
        addMsg("bot", reply);
        history.push({ role: "assistant", content: reply });
        break;
      }
    }
  } catch(e) {
    setStatus(null);
    addMsg("bot", "❌ " + e.message);
  }

  setBusy(false);
}
</script>
</body>
</html>
